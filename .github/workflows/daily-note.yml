name: Generate Daily AI Note

on:
  schedule:
    - cron: "0 0 * * *" # [임시 테스트용] UTC 00:00 = 한국시간(KST) 오전 9:00 -- 확인 후 원래 스케줄로 되돌릴 것
  workflow_dispatch:
    inputs:
      date:
        description: "노트 날짜 (YYYY-MM-DD). 비워두면 오늘 날짜를 씁니다."
        required: false
      force:
        description: "같은 날짜의 노트가 있어도 덮어쓸지"
        type: boolean
        default: false
      topic:
        description: "주제 직접 지정 (비워두면 topics.txt 맨 위 줄을 사용, 소비하지 않음)"
        required: false

permissions:
  contents: write

jobs:
  generate-note:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -e .

      - name: 오늘의 노트 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NOTE_DATE: ${{ github.event.inputs.date }}
          FORCE: ${{ github.event.inputs.force }}
          NOTE_TOPIC: ${{ github.event.inputs.topic }}
        run: |
          ARGS=()
          if [ -n "$NOTE_DATE" ]; then ARGS+=(--date "$NOTE_DATE"); fi
          if [ "$FORCE" = "true" ]; then ARGS+=(--force); fi
          if [ -n "$NOTE_TOPIC" ]; then ARGS+=("$NOTE_TOPIC"); fi
          ai-daily-notes "${ARGS[@]}"

      - name: 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notes/ topics.txt
          git diff --cached --quiet || git commit -m "[ai_daily_notes] Auto-generate daily note"
          git push
